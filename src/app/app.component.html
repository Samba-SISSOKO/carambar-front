<div class="container">
  <h1>🍬 Carambar & Co - Blagues</h1>

  <button (click)="loadRandomJoke()" class="btn">
    Générer une blague aléatoire
  </button>

  <div *ngIf="loading" class="loading">
    Chargement...
  </div>

  <div *ngIf="error" class="error">
    {{ error }}
  </div>

  <div *ngIf="joke" class="joke-card">
    <h2>😂 Question :</h2>
    <p class="question">{{ joke.question }}</p>

    <h2>🤣 Réponse :</h2>
    <p class="answer">{{ joke.answer }}</p>
  </div>
</div>
